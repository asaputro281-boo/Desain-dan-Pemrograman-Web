<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Program Alert Modern</title>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        h1 {
            margin-bottom: 10px;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            background: white;
            color: #333;
            cursor: pointer;
            font-weight: 500;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>👋 Halo!</h1>
        <p>Klik tombol di bawah untuk menampilkan pesan</p>
        <button onclick="tampilAlert()">Tampilkan Alert</button>
    </div>

    <script>
        function tampilAlert() {
            alert("Hallo Semuanya!");
        }

        // otomatis muncul saat halaman dibuka
        window.onload = function () {
            alert("Selamat datang di halaman ini!");
        }
    </script>

</body>

</html>
