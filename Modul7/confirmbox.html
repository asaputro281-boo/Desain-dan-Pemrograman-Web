<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Confirm Box Modern</title>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }

        h2 {
            margin-bottom: 15px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            background: white;
            color: #333;
            cursor: pointer;
            font-weight: 500;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        #demo {
            margin-top: 15px;
            font-weight: 500;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>🔐 Konfirmasi Logout</h2>
        <p>Klik tombol untuk melanjutkan</p>
        <button onclick="myFunction()">Klik Ini</button>
        <p id="demo"></p>
    </div>

    <script>
        function myFunction() {
            let txt;

            if (confirm("Apakah Anda Akan Logout?")) {
                txt = "✅ Anda Mengklik OK";
            } else {
                txt = "❌ Anda Mengklik Cancel";
            }

            document.getElementById("demo").innerHTML = txt;
        }
    </script>

</body>

</html>
