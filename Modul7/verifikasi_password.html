<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Verifikasi Password</title>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 320px;
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        input[type="password"] {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-bottom: 15px;
            outline: none;
        }

        input[type="password"]:focus {
            border-color: #667eea;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            background: #667eea;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        #pesan {
            margin-top: 10px;
            font-size: 14px;
            font-weight: 500;
        }

        .error {
            color: red;
        }

        .success {
            color: green;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>🔐 Verifikasi Password</h2>

        <form name="formTes">
            <input type="password" name="password_1" placeholder="Masukkan Password">
            <input type="password" name="password_2" placeholder="Ulangi Password">

            <button type="button" onclick="cekPassword()">Proses</button>
        </form>

        <div id="pesan"></div>
    </div>

    <script>
        function cekPassword() {
            let p1 = document.formTes.password_1.value;
            let p2 = document.formTes.password_2.value;
            let pesan = document.getElementById("pesan");

            if (p1 === "" || p2 === "") {
                pesan.innerHTML = "⚠️ Password tidak boleh kosong!";
                pesan.className = "error";
            } 
            else if (p1 !== p2) {
                pesan.innerHTML = "❌ Password tidak sama!";
                pesan.className = "error";
            } 
            else {
                pesan.innerHTML = "✅ Password cocok!";
                pesan.className = "success";

                // redirect setelah 1 detik
                setTimeout(() => {
                    window.location.href = "alert.html";
                }, 1000);
            }
        }
    </script>

</body>

</html>
