<!DOCTYPE html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTP-8">
    <title> Tipe Input </title>
    <link rel="icon" type="img/png" href="gambar/icon.png" sizes="16x16"/>
    <meta name="viewport" content="width=device-width, initial-scale">
</head>
<body>
<hr>
     <h3> UJI COBA 7</h3>
    <label for="quantity">Quantity (between 1 and 5):</label>
    <input type="number" id="quantity" name="quantity" min="-50" max="10"><br>
    <label for="vol" > Volume (between 0 and 50):</label>
    <input type="range" id="vol" name="vol" min="0" max="50"><br>
<br>
</body>
</html>
<p>Jika nilai min diubah menjadi -50, maka kita bisa memasukkan angka negatif sampai -50. 
Artinya, nilai min menentukan batas angka yang boleh diisi pada input number.</p>
