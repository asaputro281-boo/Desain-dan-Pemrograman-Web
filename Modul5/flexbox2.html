<!DOCTYPE html>
<html lang="en">
<head>
    <p> SKENARIO 2</p>
    <meta charset="UTF-8">
    <title>FlexBox Angga</title>
    <style>
        .wadah-flex {
            display: flex; /* fleksibel */
            background-color: rgb(11, 166, 222);
            gap: 1px;
            padding: 10px;
        }

        /* Skenario 2 – style untuk setiap anak div */
        .wadah-flex > div {
            background-color: orange;
            color: black;
            margin: 10px;
            padding: 10px;
            font-size: 30px;
        }
        
    </style>
</head>
<body>
    <div class="wadah-flex">
        <div>1</div>
        <div>2</div>
        <div>3</div>
    </div>
    <p>Kesimpulan skenario 2: 
        Penambahan style pada setiap div membuat tampilan kotak lebih jelas, memiliki jarak antar elemen, dan ukuran teks lebih besar sehingga tampilan lebih rapi.
    </p>
</body>
</html>
