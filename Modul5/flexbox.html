<!DOCTYPE html>
<html lang="en">
<head>
    <p> SKENARIO 1</p>
    <meta charset="UTF-8">
    <title>FlexBox Angga</title>
    <style>
        .wadah-flex {
            display: flex; 
            background-color: rgb(11, 166, 222);
            gap: 1px;
            padding: 10px;
        }

        
        .wadah-flex > div {
            background-color: orange;
            color: black;
            margin: 10px;
            padding: 20px;
            font-size: 20px;
        }
        
    </style>
</head>
<body>
    <div class="wadah-flex">
        <div>1</div>
        <div>2</div>
        <div>3</div>
    </div>
    <p>Kesimpulan skenario 1:
        Pada skenario ini, elemen div ditempatkan didalam sebuah wadah yang menggunakan flexbox.
        Hal ini membuat setiap kotak angka (1,2,3) tersusun secara fleksibel dalam satu baris 
    </p>
</body>
</html>
