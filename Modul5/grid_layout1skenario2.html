<!DOCTYPE html>
<html lang="en">
<head>
    <title>Grid Layout Angga Skenario 2</title>
    <meta charset="UTF-8">
    <title>Belajar CSS Grid box</title>
    <style>
        .tempat_grid {
            display: inline-grid;
            grid-template-columns: auto auto auto;
            background-color: #2196F3;
            padding: 10px;
            gap: 1px;
        }

        .item_grid {
            background-color: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(0, 0, 0, 0.8);
            padding: 20px;
            font-size: 30px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Grid Layout Angga</h1>
    <div class="tempat_grid">
        <div class="item_grid">1</div>
        <div class="item_grid">2</div>
        <div class="item_grid">3</div>
        <div class="item_grid">4</div>
        <div class="item_grid">5</div>
        <div class="item_grid">6</div>
        <div class="item_grid">7</div>
        <div class="item_grid">8</div>
        <div class="item_grid">9</div>
      
    </div>
 <p>
    Kesimpulan skenario 2 adalah Inline-grid membuat container grid hanya mengambil ruang sesuai isi, tidak memenuhi satu baris penuh seperti grid biasa.
</p>
</body>
</html>
</html>
