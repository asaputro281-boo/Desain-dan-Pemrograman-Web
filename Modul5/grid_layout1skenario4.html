<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Grid Layout Angga Skenario 4</title>

<style>

    .tempat_grid{
        display: inline-grid;
        grid-gap: 50px;
        background-color: #2196F3;
        padding: 10px;
    }

    .tempat_grid div{
        background-color: rgba(255, 255, 255, 0.8);
        border: 1px solid rgba(0, 0, 0, 0.8);
        padding: 20px;
        text-align: center;
    }

</style>
</head>

<body>

<h2>Grid Layout Angga</h2>

    <div class="tempat_grid">
    <div>1</div>
    <div>2</div>
    <div>3</div>
    <div>4</div>
    <div>5</div>
    <div>6</div>
    <div>7</div>
    <div>8</div>
    <div>9</div>


</div>

<p>
Kesimpulan skenario 4 : Property grid-gap digunakan untuk memberi jarak antar elemen grid sehingga tampilan menjadi lebih rapi dan tidak saling menempel.
</body>
</html>
